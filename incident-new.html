<div class="page-body">
  <div class="container" style="max-width:680px;">
    <div class="page-header" style="margin-bottom:var(--spacing-24);">
      <h1>Nueva incidencia</h1>
      <div class="meta">Registra un retardo, falta, permiso o incapacidad</div>
    </div>

    <div class="card" style="padding:var(--spacing-24);">
      <div class="form-field">
        <label for="inc-email">Empleado (correo) *</label>
        <input type="text" id="inc-email" list="known-emails-list" placeholder="correo@infonavit.org.mx">
        <datalist id="known-emails-list"></datalist>
      </div>
      <div class="form-field-row">
        <div class="form-field">
          <label for="inc-type">Tipo de incidencia *</label>
          <select id="inc-type">
            <option value="">Seleccionar…</option>
            <option value="retardo">Retardo</option>
            <option value="falta_injustificada">Falta injustificada</option>
            <option value="falta_justificada">Falta justificada</option>
            <option value="permiso_goce">Permiso con goce de sueldo</option>
            <option value="permiso_sin_goce">Permiso sin goce de sueldo</option>
            <option value="incapacidad">Incapacidad IMSS</option>
          </select>
        </div>
        <div class="form-field">
          <label for="inc-date">Fecha *</label>
          <input type="date" id="inc-date">
        </div>
      </div>
      <div class="form-field-row">
        <div class="form-field">
          <label for="inc-duration">Duración</label>
          <input type="number" id="inc-duration" min="1" placeholder="Ej. 2">
        </div>
        <div class="form-field">
          <label for="inc-duration-type">Unidad</label>
          <select id="inc-duration-type">
            <option value="horas">Horas</option>
            <option value="días">Días</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label for="inc-notes">Justificación / Notas</label>
        <textarea id="inc-notes" placeholder="Describe el motivo, número de documento IMSS, etc."></textarea>
      </div>
      <p id="inc-error" style="color:var(--color-infonavit-red);font-size:14px;margin:0 0 16px;display:none;"></p>
      <div style="display:flex;justify-content:flex-end;gap:12px;">
        <a href="incidents.html" class="btn btn-secondary">Cancelar</a>
        <button type="button" class="btn btn-primary" id="submit-btn">Guardar incidencia</button>
      </div>
    </div>
  </div>
